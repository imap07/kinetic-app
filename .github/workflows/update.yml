name: EAS Update (OTA)

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Update branch'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - production

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Publish OTA update
        run: |
          eas update \
            --branch ${{ github.event.inputs.branch }} \
            --message "${{ github.event.inputs.branch }}: ${{ github.sha }}" \
            --non-interactive
