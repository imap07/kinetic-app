name: EAS Build

on:
  push:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      profile:
        description: 'Build profile'
        required: true
        default: 'preview'
        type: choice
        options:
          - development
          - preview
          - production
      platform:
        description: 'Platform'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - ios
          - android

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Write ASC API Key
        if: |
          (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.profile == 'production')
        run: echo "${{ secrets.ASC_API_KEY }}" > /tmp/asc_api_key.p8

      # develop → preview build (iOS + Android, sin submit)
      - name: Build preview (develop branch)
        if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
        run: eas build --platform all --profile preview --non-interactive

      # main → production build iOS con auto-submit a TestFlight
      - name: Build iOS production + submit to TestFlight (main branch)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: eas build --platform ios --profile production --non-interactive --auto-submit

      # main → production build Android (sin auto-submit por ahora)
      - name: Build Android production (main branch)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: eas build --platform android --profile production --non-interactive

      # Manual trigger
      - name: Build (manual trigger)
        if: github.event_name == 'workflow_dispatch'
        run: |
          eas build \
            --platform ${{ github.event.inputs.platform }} \
            --profile ${{ github.event.inputs.profile }} \
            --non-interactive \
            ${{ github.event.inputs.profile == 'production' && github.event.inputs.platform != 'android' && '--auto-submit' || '' }}
