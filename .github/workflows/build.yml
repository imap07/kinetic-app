name: EAS Build

on:
  push:
    branches: [develop]
  workflow_dispatch:
    inputs:
      profile:
        description: 'Build profile'
        required: true
        default: 'preview'
        type: choice
        options:
          - development
          - preview
          - production
      platform:
        description: 'Platform'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - ios
          - android
      submit:
        description: 'Auto-submit iOS to TestFlight/App Store'
        required: false
        default: false
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      # develop → preview builds (iOS + Android)
      - name: Build iOS preview (develop)
        if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
        run: eas build --platform ios --profile preview --non-interactive

      - name: Build Android preview (develop)
        if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
        run: eas build --platform android --profile preview --non-interactive

      # Manual trigger
      - name: Write ASC API Key
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.submit == 'true'
        run: echo "${{ secrets.ASC_API_KEY }}" > /tmp/asc_api_key.p8

      - name: Build (manual)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.submit != 'true'
        run: |
          eas build \
            --platform ${{ github.event.inputs.platform }} \
            --profile ${{ github.event.inputs.profile }} \
            --non-interactive

      - name: Build + Submit (manual)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.submit == 'true'
        run: |
          eas build \
            --platform ${{ github.event.inputs.platform }} \
            --profile ${{ github.event.inputs.profile }} \
            --non-interactive \
            --auto-submit
